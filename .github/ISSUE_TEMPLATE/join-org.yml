name: 加入 velotricai 组织申请
description: 申请加入后能访问 velotric-skills 私有仓库
title: "[加入申请]"
labels: ["join-request"]
body:
  - type: markdown
    attributes:
      value: |
        ## 欢迎加入 Velotric AI Skill 平台 👋

        **直接点底部 Submit 即可**——机器人会自动用你当前登录的 GitHub 账号给你发邀请，不需要你填任何信息。

        提交后等约 30 秒，机器人会评论这个 issue 告诉你结果。
        然后去你 GitHub 注册邮箱查邀请邮件，点 **Accept invitation** 就完事。

  - type: textarea
    id: purpose
    attributes:
      label: 想用 velotric skills 做什么？（可选，跳过也行）
      description: 一句话即可，让我们了解你的角色 + 给你推荐合适 skill
      placeholder: 我做产品，想用 PRD 检查 skill / 我是工程，想分享我的 skill 给团队
