name: Auto-invite to velotricai org

# v0.8 设计：撤销 allowlist（增加 perry 维护成本，违反"减少维护成本"原则）
#   退回 v0.7 全自动 + 飞书监督。安全靠：
#   1. 飞书每次入组通知 perry（perry 看到不认识的人 1 click revoke）
#   2. velotricai 是私有 org，新成员只 read 权限（CODEOWNERS 拦 push）
#   3. admin 随时 revoke 兜底
# 触发：labeled / reopened（去掉 opened，避免 issue label 还没加上时跑空）

on:
  issues:
    types: [labeled, reopened]

permissions:
  issues: write
  contents: read

jobs:
  invite:
    if: contains(github.event.issue.title, '[加入申请]') || contains(github.event.issue.labels.*.name, 'join-request')
    runs-on: ubuntu-latest
    steps:
      - name: 拿 issue 作者身份（GitHub 已经验证过存在）
        id: who
        run: |
          echo "username=${{ github.event.issue.user.login }}" >> "$GITHUB_OUTPUT"
          echo "user_id=${{ github.event.issue.user.id }}" >> "$GITHUB_OUTPUT"

      - name: 检查是否已是 velotricai 成员
        id: membership
        env:
          GH_TOKEN: ${{ secrets.ORG_INVITE_TOKEN }}
          USERNAME: ${{ steps.who.outputs.username }}
        run: |
          if gh api "/orgs/velotricai/members/$USERNAME" --silent 2>/dev/null; then
            echo "already_member=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_member=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 已是成员 → 友好提示
        if: steps.membership.outputs.already_member == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          USERNAME: ${{ steps.who.outputs.username }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "ℹ️ \`@$USERNAME\` 已经是 velotricai 组织成员了。直接回到 [安装指南](https://github.com/velotricai/skills-install) 继续装 skill 即可。"
          gh issue close "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --reason "completed"

      - name: 已是成员 → 飞书通知（监督所有入组事件）
        if: steps.membership.outputs.already_member == 'true' && env.FEISHU_WEBHOOK != ''
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_NOTIFY_WEBHOOK }}
          USERNAME: ${{ steps.who.outputs.username }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          MESSAGE="ℹ️ velotricai 入组申请（已是成员）

          GitHub 用户：@$USERNAME（已经是成员，无需重复邀请）
          时间：$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          查看 issue：$ISSUE_URL"
          PAYLOAD=$(jq -n --arg t "$MESSAGE" '{msg_type: "text", content: {text: $t}}')
          curl -s -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$FEISHU_WEBHOOK" | head -200

      - name: 发送组织邀请
        if: steps.membership.outputs.already_member == 'false'
        id: invite
        env:
          GH_TOKEN: ${{ secrets.ORG_INVITE_TOKEN }}
          USER_ID: ${{ steps.who.outputs.user_id }}
          USERNAME: ${{ steps.who.outputs.username }}
        run: |
          TEAM_ID=$(gh api /orgs/velotricai/teams/contributors -q .id)

          if gh api -X POST /orgs/velotricai/invitations \
              -F invitee_id="$USER_ID" \
              -F role=direct_member \
              -F "team_ids[]=$TEAM_ID" \
              --silent 2>/tmp/invite-err; then
            echo "invited=true" >> "$GITHUB_OUTPUT"
          else
            ERR_CONTENT=$(cat /tmp/invite-err)
            # 422 = 已存在 invitation；race condition 兼容
            if echo "$ERR_CONTENT" | grep -q "422"; then
              echo "invited=true" >> "$GITHUB_OUTPUT"
              echo "（已存在 pending invitation，视为成功）"
            else
              echo "invited=false" >> "$GITHUB_OUTPUT"
              echo "error=$ERR_CONTENT" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: 邀请成功 → 评论 issue
        if: steps.invite.outputs.invited == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          USERNAME: ${{ steps.who.outputs.username }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "✅ 已邀请 @$USERNAME 加入 velotricai 组织。

          **下一步**：
          1. 去你 GitHub 注册时用的邮箱，找一封标题含 \`velotricai\` 的邀请邮件
          2. 点邮件里的 **Accept invitation**（或者直接打开 https://github.com/orgs/velotricai/invitation 接受）
          3. 接受后回到 [安装指南](https://github.com/velotricai/skills-install)，跟你的 AI 说 \`继续装 velotric skills\`"
          gh issue close "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --reason "completed"

      - name: 邀请成功 → 飞书通知 perry
        if: steps.invite.outputs.invited == 'true' && env.FEISHU_WEBHOOK != ''
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_NOTIFY_WEBHOOK }}
          USERNAME: ${{ steps.who.outputs.username }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          MESSAGE="🎉 velotricai 自动入组通知

          GitHub 用户：@$USERNAME
          时间：$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          查看 issue：$ISSUE_URL

          ⚠️ 如果不认识此人 1-click 移除：https://github.com/orgs/velotricai/people"
          PAYLOAD=$(jq -n --arg t "$MESSAGE" '{msg_type: "text", content: {text: $t}}')
          curl -s -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$FEISHU_WEBHOOK" | head -200

      - name: 邀请失败 → 飞书告警 + 评论 issue
        if: steps.invite.outputs.invited == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_NOTIFY_WEBHOOK }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          USERNAME: ${{ steps.who.outputs.username }}
          ERROR: ${{ steps.invite.outputs.error }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "⚠️ 邀请 @$USERNAME 失败：

          \`\`\`
          $ERROR
          \`\`\`

          已通知 @perry-czp 处理。"

          if [ -n "${FEISHU_WEBHOOK:-}" ]; then
            MESSAGE="⚠️ velotricai 自动入组失败
          申请用户：@$USERNAME
          错误：$ERROR
          时间：$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          查看 issue：$ISSUE_URL"
            PAYLOAD=$(jq -n --arg t "$MESSAGE" '{msg_type: "text", content: {text: $t}}')
            curl -s -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$FEISHU_WEBHOOK" | head -200
          fi
