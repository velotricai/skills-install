name: Cross-platform install verification

on:
  pull_request:
    branches: [main]
    paths:
      - install-guide.md
      - .github/workflows/install-cross-platform.yml
      - README.md
  workflow_dispatch:
  schedule:
    # Daily 05:17 Asia/Shanghai. Catches install drift before the workday starts.
    - cron: "17 21 * * *"
  push:
    branches: [main]
    paths:
      - install-guide.md
      - .github/workflows/install-cross-platform.yml

permissions:
  contents: read

jobs:
  macos-install:
    name: macOS install.sh
    runs-on: macos-latest
    steps:
      - name: Checkout public install repo
        uses: actions/checkout@v4

      - name: Confirm public entrypoint shape
        shell: bash
        run: |
          set -euo pipefail
          test -f install-guide.md
          if [ -f install.sh ]; then
            echo "Public repo has install.sh; this workflow still validates the guide-driven private installer path."
          else
            echo "Public repo has no install.sh; install-guide.md points users to clone velotricai/velotric-skills."
          fi
          grep -q "gh repo clone velotricai/velotric-skills" install-guide.md
          grep -q "velotric-skill-meta/scripts/install.sh" install-guide.md
          grep -q "我是 Adam，下一步怎么把我的 business thinking skill 第一版发到公司仓库" install-guide.md
          grep -q "你不需要先懂 Git、YAML 或 PR" install-guide.md
          grep -q "不要把 GitHub token / PAT 粘贴到 AI 聊天" install-guide.md
          grep -q "不要把这份指南整段丢给用户读" install-guide.md
          grep -q "AI 安装向导协议" install-guide.md
          grep -q "一次一个动作" install-guide.md
          grep -q "不要索要 token" install-guide.md
          grep -q "winget install --id GitHub.cli -e --source winget" install-guide.md
          grep -q "GitHub CLI 已安装但当前会话找不到 gh.exe" install-guide.md
          grep -q "普通用户安装流程禁止引导创建 classic PAT" install-guide.md

      - name: Clone private velotric-skills repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.VELOTRIC_SKILLS_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing VELOTRIC_SKILLS_PAT secret. Add a PAT with read access to velotricai/velotric-skills."
            exit 1
          fi
          VSK_HOME="$RUNNER_TEMP/velotric-skills"
          gh repo clone velotricai/velotric-skills "$VSK_HOME"
          echo "VSK_HOME=$VSK_HOME" >> "$GITHUB_ENV"

      - name: Run install.sh with isolated HOME
        shell: bash
        env:
          HOME: ${{ runner.temp }}/velotric-home
          SHELL: /bin/zsh
        run: |
          set -euo pipefail
          mkdir -p "$HOME"
          bash "$VSK_HOME/velotric-skill-meta/scripts/install.sh"

          test -L "$HOME/.agents/skills/velotric-skill-meta"
          test -L "$HOME/.codex/skills/velotric-skill-meta"
          test -L "$HOME/.claude/skills/velotric-skill-meta"
          grep -qx "velotric-skill-meta" "$HOME/.velotric-skills/installed.txt"

          installed_count="$(grep -v '^#' "$HOME/.velotric-skills/installed.txt" | grep -vc '^[[:space:]]*$')"
          test "$installed_count" -eq 1
          test ! -e "$HOME/.agents/skills/ops-hiring-workflow"

      - name: Verify install.sh add/remove/reapply
        shell: bash
        env:
          HOME: ${{ runner.temp }}/velotric-home
          SHELL: /bin/zsh
        run: |
          set -euo pipefail

          active_installed() {
            grep -v '^#' "$HOME/.velotric-skills/installed.txt" | grep -v '^[[:space:]]*$' | sort
          }

          assert_installed_exact() {
            expected="$1"
            actual="$(active_installed | tr '\n' ',' | sed 's/,$//')"
            if [ "$actual" != "$expected" ]; then
              echo "Expected installed list '$expected', got '$actual'"
              cat "$HOME/.velotric-skills/installed.txt"
              exit 1
            fi
          }

          assert_skill_present() {
            skill="$1"
            test -e "$HOME/.agents/skills/$skill/SKILL.md"
            test -e "$HOME/.codex/skills/$skill/SKILL.md"
            test -e "$HOME/.claude/skills/$skill/SKILL.md"
          }

          assert_skill_absent() {
            skill="$1"
            test ! -e "$HOME/.agents/skills/$skill"
            test ! -e "$HOME/.codex/skills/$skill"
            test ! -e "$HOME/.claude/skills/$skill"
          }

          bash "$VSK_HOME/velotric-skill-meta/scripts/install.sh" --add ops-hiring-workflow
          assert_skill_present "velotric-skill-meta"
          assert_skill_present "ops-hiring-workflow"
          assert_installed_exact "ops-hiring-workflow,velotric-skill-meta"

          rm -f "$HOME/.agents/skills/ops-hiring-workflow"
          bash "$VSK_HOME/velotric-skill-meta/scripts/install.sh" --reapply
          assert_skill_present "ops-hiring-workflow"
          assert_installed_exact "ops-hiring-workflow,velotric-skill-meta"

          bash "$VSK_HOME/velotric-skill-meta/scripts/install.sh" --remove ops-hiring-workflow
          assert_skill_absent "ops-hiring-workflow"
          assert_skill_present "velotric-skill-meta"
          assert_installed_exact "velotric-skill-meta"

          rm -f "$HOME/.agents/skills/velotric-skill-meta"
          bash "$VSK_HOME/velotric-skill-meta/scripts/install.sh" --reapply
          assert_skill_present "velotric-skill-meta"
          assert_skill_absent "ops-hiring-workflow"
          assert_installed_exact "velotric-skill-meta"

  windows-install:
    name: Windows install.ps1
    runs-on: windows-latest
    steps:
      - name: Checkout public install repo
        uses: actions/checkout@v4

      - name: Confirm public entrypoint shape
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path "install-guide.md")) {
            throw "install-guide.md is missing"
          }
          if (Test-Path "install.sh") {
            Write-Host "Public repo has install.sh; this workflow still validates the guide-driven private installer path."
          } else {
            Write-Host "Public repo has no install.sh; install-guide.md points users to clone velotricai/velotric-skills."
          }
          Select-String -Path "install-guide.md" -Pattern "gh repo clone velotricai/velotric-skills" -SimpleMatch | Out-Null
          Select-String -Path "install-guide.md" -Pattern "install.ps1" -SimpleMatch | Out-Null
          Select-String -Path "install-guide.md" -Pattern "我是 Adam，下一步怎么把我的 business thinking skill 第一版发到公司仓库" -SimpleMatch | Out-Null
          Select-String -Path "install-guide.md" -Pattern "你不需要先懂 Git、YAML 或 PR" -SimpleMatch | Out-Null
          Select-String -Path "install-guide.md" -Pattern "不要把 GitHub token / PAT 粘贴到 AI 聊天" -SimpleMatch | Out-Null
          Select-String -Path "install-guide.md" -Pattern "不要把这份指南整段丢给用户读" -SimpleMatch | Out-Null
          Select-String -Path "install-guide.md" -Pattern "AI 安装向导协议" -SimpleMatch | Out-Null
          Select-String -Path "install-guide.md" -Pattern "一次一个动作" -SimpleMatch | Out-Null
          Select-String -Path "install-guide.md" -Pattern "不要索要 token" -SimpleMatch | Out-Null
          Select-String -Path "install-guide.md" -Pattern "winget install --id GitHub.cli -e --source winget" -SimpleMatch | Out-Null
          Select-String -Path "install-guide.md" -Pattern "GitHub CLI 已安装但当前会话找不到 gh.exe" -SimpleMatch | Out-Null
          Select-String -Path "install-guide.md" -Pattern "普通用户安装流程禁止引导创建 classic PAT" -SimpleMatch | Out-Null

      - name: Clone private velotric-skills repo
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.VELOTRIC_SKILLS_PAT }}
        run: |
          $ErrorActionPreference = "Stop"
          if (-not $env:GH_TOKEN) {
            throw "Missing VELOTRIC_SKILLS_PAT secret. Add a PAT with read access to velotricai/velotric-skills."
          }
          $vskHome = Join-Path $env:RUNNER_TEMP "velotric-skills"
          gh repo clone velotricai/velotric-skills $vskHome
          "VSK_HOME=$vskHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run install.ps1 with isolated USERPROFILE
        shell: pwsh
        env:
          HOME: ${{ runner.temp }}\velotric-home
          USERPROFILE: ${{ runner.temp }}\velotric-home
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path $env:USERPROFILE | Out-Null
          pwsh -NoProfile -ExecutionPolicy Bypass -File "$env:VSK_HOME\velotric-skill-meta\scripts\install.ps1"

          if (-not (Test-Path "$env:USERPROFILE\.agents\skills\velotric-skill-meta\SKILL.md")) {
            throw "velotric-skill-meta was not installed into .agents"
          }
          if (-not (Test-Path "$env:USERPROFILE\.codex\skills\velotric-skill-meta\SKILL.md")) {
            throw "velotric-skill-meta was not installed into .codex"
          }
          if (-not (Test-Path "$env:USERPROFILE\.claude\skills\velotric-skill-meta\SKILL.md")) {
            throw "velotric-skill-meta was not installed into .claude"
          }

          $installed = @(Get-Content "$env:USERPROFILE\.velotric-skills\installed.txt" |
            Where-Object { $_ -and -not $_.Trim().StartsWith("#") } |
            ForEach-Object { $_.Trim() } |
            Where-Object { $_ })
          if (($installed.Count -ne 1) -or ($installed[0] -ne "velotric-skill-meta")) {
            throw "Expected only velotric-skill-meta to be installed; got: $($installed -join ', ')"
          }
          if (Test-Path "$env:USERPROFILE\.agents\skills\ops-hiring-workflow") {
            throw "Default install should not install ops-hiring-workflow"
          }

      - name: Verify install.ps1 add/remove/reapply
        shell: pwsh
        env:
          HOME: ${{ runner.temp }}\velotric-home
          USERPROFILE: ${{ runner.temp }}\velotric-home
        run: |
          $ErrorActionPreference = "Stop"

          function Get-ActiveInstalled {
            @(Get-Content "$env:USERPROFILE\.velotric-skills\installed.txt" |
              Where-Object { $_ -and -not $_.Trim().StartsWith("#") } |
              ForEach-Object { $_.Trim() } |
              Where-Object { $_ } |
              Sort-Object)
          }

          function Assert-InstalledExact([string[]]$Expected) {
            $actual = @(Get-ActiveInstalled)
            $expectedSorted = @($Expected | Sort-Object)
            if (($actual.Count -ne $expectedSorted.Count) -or
                (Compare-Object -ReferenceObject $expectedSorted -DifferenceObject $actual)) {
              throw "Expected installed list '$($expectedSorted -join ',')', got '$($actual -join ',')'"
            }
          }

          function Assert-SkillPresent([string]$Skill) {
            foreach ($root in @(".agents", ".codex", ".claude")) {
              $path = Join-Path $env:USERPROFILE "$root\skills\$Skill\SKILL.md"
              if (-not (Test-Path $path)) {
                throw "$Skill is missing at $path"
              }
            }
          }

          function Assert-SkillAbsent([string]$Skill) {
            foreach ($root in @(".agents", ".codex", ".claude")) {
              $path = Join-Path $env:USERPROFILE "$root\skills\$Skill"
              if (Test-Path $path) {
                throw "$Skill should be absent at $path"
              }
            }
          }

          pwsh -NoProfile -ExecutionPolicy Bypass -File "$env:VSK_HOME\velotric-skill-meta\scripts\install.ps1" -Add ops-hiring-workflow
          Assert-SkillPresent "velotric-skill-meta"
          Assert-SkillPresent "ops-hiring-workflow"
          Assert-InstalledExact @("velotric-skill-meta", "ops-hiring-workflow")

          Remove-Item -Path "$env:USERPROFILE\.agents\skills\ops-hiring-workflow" -Recurse -Force
          pwsh -NoProfile -ExecutionPolicy Bypass -File "$env:VSK_HOME\velotric-skill-meta\scripts\install.ps1" -Reapply
          Assert-SkillPresent "ops-hiring-workflow"
          Assert-InstalledExact @("velotric-skill-meta", "ops-hiring-workflow")

          pwsh -NoProfile -ExecutionPolicy Bypass -File "$env:VSK_HOME\velotric-skill-meta\scripts\install.ps1" -Remove ops-hiring-workflow
          Assert-SkillAbsent "ops-hiring-workflow"
          Assert-SkillPresent "velotric-skill-meta"
          Assert-InstalledExact @("velotric-skill-meta")

          Remove-Item -Path "$env:USERPROFILE\.agents\skills\velotric-skill-meta" -Recurse -Force
          pwsh -NoProfile -ExecutionPolicy Bypass -File "$env:VSK_HOME\velotric-skill-meta\scripts\install.ps1" -Reapply
          Assert-SkillPresent "velotric-skill-meta"
          Assert-SkillAbsent "ops-hiring-workflow"
          Assert-InstalledExact @("velotric-skill-meta")

  notify-failure:
    name: Notify Feishu on failure
    needs: [macos-install, windows-install]
    if: ${{ always() && (needs.macos-install.result == 'failure' || needs.macos-install.result == 'cancelled' || needs.windows-install.result == 'failure' || needs.windows-install.result == 'cancelled') }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Feishu alert
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_NOTIFY_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MAC_RESULT: ${{ needs.macos-install.result }}
          WIN_RESULT: ${{ needs.windows-install.result }}
        run: |
          set -euo pipefail
          if [ -z "${FEISHU_WEBHOOK:-}" ]; then
            echo "FEISHU_NOTIFY_WEBHOOK is not configured; skip notification."
            exit 0
          fi
          MESSAGE="⚠️ Velotric Skills 每日安装巡检失败

          仓库：${GITHUB_REPOSITORY}
          macOS：${MAC_RESULT}
          Windows：${WIN_RESULT}
          时间：$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          查看 Actions：${RUN_URL}"
          PAYLOAD=$(jq -n --arg t "$MESSAGE" '{msg_type: "text", content: {text: $t}}')
          curl -sS -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$FEISHU_WEBHOOK" | head -200
